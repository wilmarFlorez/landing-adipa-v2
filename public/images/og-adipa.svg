      <stop offset="0%"   stop-color="#704EFD"/>
      <stop offset="100%" stop-color="#2CB7FF"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="980" cy="120" r="200" fill="rgba(255,255,255,0.06)"/>
  <circle cx="220" cy="510" r="150" fill="rgba(255,255,255,0.06)"/>

  <!-- Logotype -->
  <text
